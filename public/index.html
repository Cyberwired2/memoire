<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memoire — Your Photo Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0d0b; --surface: #161410; --border: #2a2620;
      --gold: #c9a96e; --cream: #f0ead8; --muted: #6b6355; --danger: #c0392b;
    }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--cream); min-height: 100vh; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login-box { width: 100%; max-width: 400px; border: 1px solid var(--border); padding: 3rem 2.5rem; background: var(--surface); position: relative; }
    .login-box::before { content: ''; position: absolute; top: -1px; left: 20px; right: 20px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .login-wordmark { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; font-style: italic; color: var(--gold); text-align: center; margin-bottom: 0.3rem; }
    .login-tagline { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 2.5rem; }
    label { display: block; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input[type=text], input[type=password] { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--cream); font-family: 'DM Mono', monospace; font-size: 0.85rem; padding: 0.75rem 1rem; outline: none; transition: border-color 0.2s; margin-bottom: 1.2rem; }
    input:focus { border-color: var(--gold); }
    .btn { width: 100%; padding: 0.85rem; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn:hover { background: var(--gold); color: var(--bg); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .error-msg { color: #e74c3c; font-size: 0.7rem; margin-top: 0.8rem; text-align: center; min-height: 1rem; }
    #app { display: none; }
    header { border-bottom: 1px solid var(--border); padding: 1.2rem 2.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .wordmark { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; font-style: italic; color: var(--gold); }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .username-badge { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); }
    .logout-btn { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; background: none; border: none; color: var(--muted); cursor: pointer; }
    .logout-btn:hover { color: var(--cream); }
    main { padding: 3rem 2.5rem; max-width: 1400px; margin: 0 auto; }
    .upload-zone { border: 1px dashed var(--border); padding: 3rem; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 3rem; position: relative; }
    .upload-zone:hover, .upload-zone.dragging { border-color: var(--gold); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 2rem; margin-bottom: 0.8rem; color: var(--muted); }
    .upload-text { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; color: var(--cream); margin-bottom: 0.4rem; }
    .upload-sub { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); }
    .caption-row { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
    .caption-row input { flex: 1; margin-bottom: 0; }
    .caption-row .btn { width: auto; padding: 0.75rem 1.5rem; white-space: nowrap; }
    .gallery-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.5rem; }
    .gallery-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; font-style: italic; color: var(--cream); }
    .photo-count { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); }
    .photo-card { background: var(--surface); position: relative; overflow: hidden; aspect-ratio: 1; }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; cursor: pointer; }
    .photo-card:hover img { transform: scale(1.04); }
    .photo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%); opacity: 0; transition: opacity 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 1rem; pointer-events: none; }
    .photo-card:hover .photo-overlay { opacity: 1; }
    .photo-caption { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: var(--cream); margin-bottom: 0.5rem; }
    .photo-date { font-size: 0.6rem; letter-spacing: 0.1em; color: rgba(240,234,216,0.5); margin-bottom: 0.5rem; }
    .delete-btn { pointer-events: all; align-self: flex-start; background: rgba(192,57,43,0.7); border: none; color: white; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.3rem 0.6rem; cursor: pointer; font-family: 'DM Mono', monospace; }
    .delete-btn:hover { background: var(--danger); }
    .empty-state { text-align: center; padding: 5rem 2rem; color: var(--muted); }
    .empty-state p:first-child { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; color: var(--cream); margin-bottom: 0.5rem; }
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 10000; align-items: center; justify-content: center; }
    #lightbox.active { display: flex; }
    #lightbox-img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; }
    #lightbox-close { position: fixed; top: 1.5rem; right: 2rem; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; z-index: 10001; }
    #lightbox-caption { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: white; z-index: 10001; white-space: nowrap; }
    #upload-progress { display: none; margin-top: 1rem; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--gold); text-align: center; }
    .progress-bar-wrap { height: 2px; background: var(--border); margin-top: 0.5rem; }
    .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-wordmark">Mémoire</div>
    <div class="login-tagline">Your private photo vault</div>
    <label>Username</label>
    <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    <button class="btn" onclick="doLogin()">Enter</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="wordmark">Mémoire</div>
    <div class="header-right">
      <span class="username-badge" id="header-username"></span>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </header>
  <main>
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" multiple />
      <div class="upload-icon">✦</div>
      <div class="upload-text">Drop your photos here</div>
      <div class="upload-sub">or click to browse — JPG, PNG, WEBP up to 20MB each</div>
    </div>
    <div class="caption-row" id="caption-row" style="display:none">
      <input type="text" id="caption-input" placeholder="Add a caption to these memories..." />
      <button class="btn" onclick="uploadFiles()">Upload</button>
      <button class="btn btn-danger" onclick="clearSelection()">Clear</button>
    </div>
    <div id="upload-progress">
      <span id="upload-status">Uploading...</span>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    </div>
    <div class="gallery-header">
      <div class="gallery-title">Your Memories</div>
      <div class="photo-count" id="photo-count"></div>
    </div>
    <div class="gallery-grid" id="gallery"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <p>No memories yet.</p>
      <p>Upload your first photo above to begin.</p>
    </div>
  </main>
</div>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-caption"></div>
</div>

<script>
  let selectedFiles = [];

  async function checkAuth() {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (data.loggedIn) showApp(data.username);
  }

  async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (res.ok) { showApp(data.username); } else { errEl.textContent = data.error || 'Login failed.'; }
  }

  async function doLogout() {
    await fetch('/api/logout', { method: 'POST' });
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showApp(username) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('header-username').textContent = username;
    loadGallery();
  }

  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');
  fileInput.addEventListener('change', (e) => { selectedFiles = Array.from(e.target.files); showCaptionRow(); });
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragging'); selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')); showCaptionRow(); });
  function showCaptionRow() { if (selectedFiles.length > 0) document.getElementById('caption-row').style.display = 'flex'; }
  function clearSelection() { selectedFiles = []; fileInput.value = ''; document.getElementById('caption-row').style.display = 'none'; document.getElementById('caption-input').value = ''; }

  async function uploadFiles() {
    if (!selectedFiles.length) return;
    const caption = document.getElementById('caption-input').value;
    const progressEl = document.getElementById('upload-progress');
    const bar = document.getElementById('progress-bar');
    const statusEl = document.getElementById('upload-status');
    progressEl.style.display = 'block'; bar.style.width = '0%';
    statusEl.textContent = 'Uploading ' + selectedFiles.length + ' photo(s)...';
    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('photos', f));
    formData.append('caption', caption);
    let prog = 0;
    const interval = setInterval(() => { prog = Math.min(prog + 10, 85); bar.style.width = prog + '%'; }, 200);
    try {
      const res = await fetch('/api/photos', { method: 'POST', body: formData });
      const data = await res.json();
      clearInterval(interval); bar.style.width = '100%';
      statusEl.textContent = '✦ ' + data.count + ' photo(s) saved to your vault';
      setTimeout(() => { progressEl.style.display = 'none'; }, 2000);
      clearSelection(); loadGallery();
    } catch (e) { clearInterval(interval); statusEl.textContent = 'Upload failed. Try again.'; }
  }

  async function loadGallery() {
    const res = await fetch('/api/photos');
    if (!res.ok) return;
    const photos = await res.json();
    const grid = document.getElementById('gallery');
    const empty = document.getElementById('empty-state');
    const count = document.getElementById('photo-count');
    count.textContent = photos.length ? photos.length + ' photo' + (photos.length !== 1 ? 's' : '') : '';
    if (!photos.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = '';

    photos.forEach(function(p) {
      var date = new Date(p.uploaded_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      var card = document.createElement('div');
      card.className = 'photo-card';

      var img = document.createElement('img');
      img.src = '/uploads/' + p.filename;
      img.alt = p.original_name;
      img.loading = 'lazy';
      img.addEventListener('click', function() {
        openLightbox('/uploads/' + p.filename, p.caption || '');
      });

      var overlay = document.createElement('div');
      overlay.className = 'photo-overlay';

      if (p.caption) {
        var cap = document.createElement('div');
        cap.className = 'photo-caption';
        cap.textContent = p.caption;
        overlay.appendChild(cap);
      }

      var dateEl = document.createElement('div');
      dateEl.className = 'photo-date';
      dateEl.textContent = date;
      overlay.appendChild(dateEl);

      var delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = 'Remove';
      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deletePhoto(p.id);
      });
      overlay.appendChild(delBtn);

      card.appendChild(img);
      card.appendChild(overlay);
      grid.appendChild(card);
    });
  }

  async function deletePhoto(id) {
    if (!confirm('Remove this photo from your vault?')) return;
    await fetch('/api/photos/' + id, { method: 'DELETE' });
    loadGallery();
  }

  function openLightbox(src, caption) {
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightbox-img');
    var lbCap = document.getElementById('lightbox-caption');
    lbImg.src = src;
    lbCap.textContent = caption;
    lb.classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
  });

  checkAuth();
</script>
</body>
</html>
